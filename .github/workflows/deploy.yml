name: Deploy

# Runs on every push to master. GCP build/push/Cloud Run only run when repository
# variable ENABLE_CLOUD_DEPLOY is set to "true" and WIF + GCP_* vars/secrets are
# configured. Otherwise a single notice job succeeds so the workflow stays green.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GAR_LOCATION: ${{ vars.GCP_REGION }}-docker.pkg.dev
  IMAGE_NAME: ${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/hanaforge

jobs:
  deploy-skipped-notice:
    name: Cloud deploy not enabled
    runs-on: ubuntu-latest
    if: vars.ENABLE_CLOUD_DEPLOY != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "Skipping GCP deploy: set repo variable ENABLE_CLOUD_DEPLOY=true"
          echo "after configuring vars GCP_REGION, GCP_PROJECT_ID, GAR_REPOSITORY"
          echo "and secrets WIF_PROVIDER, WIF_SERVICE_ACCOUNT."
          echo "::notice::Deploy workflow skipped until ENABLE_CLOUD_DEPLOY is enabled."

  # Wait for CI to pass before deploying
  ci-check:
    name: Wait for CI
    if: vars.ENABLE_CLOUD_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Backend Tests (Python 3.12)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build-and-push:
    name: Build & Push Image
    if: vars.ENABLE_CLOUD_DEPLOY == 'true'
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.GAR_LOCATION }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    if: vars.ENABLE_CLOUD_DEPLOY == 'true'
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hanaforge-staging
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --set-env-vars=HANAFORGE_ENVIRONMENT=staging

      - name: Verify staging deployment
        run: |
          URL=$(gcloud run services describe hanaforge-staging --region=${{ vars.GCP_REGION }} --format='value(status.url)')
          echo "Staging URL: ${URL}"
          curl -sf "${URL}/api/v1/health" || (echo "Health check failed" && exit 1)

  deploy-production:
    name: Deploy to Production
    if: vars.ENABLE_CLOUD_DEPLOY == 'true'
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    permissions:
      contents: read
      id-token: write
    # Manual approval gate: requires review in the "production" environment
    environment: production

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hanaforge
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}
          flags: >-
            --port=8080
            --memory=2Gi
            --cpu=2
            --min-instances=1
            --max-instances=10
            --set-env-vars=HANAFORGE_ENVIRONMENT=production

      - name: Verify production deployment
        run: |
          URL=$(gcloud run services describe hanaforge --region=${{ vars.GCP_REGION }} --format='value(status.url)')
          echo "Production URL: ${URL}"
          curl -sf "${URL}/api/v1/health" || (echo "Health check failed" && exit 1)
